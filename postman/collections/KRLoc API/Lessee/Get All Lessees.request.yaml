$kind: http-request
name: Get All Lessees
method: GET
url: '{{base_url}}/lessee'
order: 1000
queryParams:
  - key: page
    value: '1'
    description: Page number
    disabled: true
  - key: limit
    value: '10'
    description: Items per page
    disabled: true
  - key: order
    value: asc
    description: Sort order (asc or desc)
    disabled: true
  - key: name
    value: ''
    description: Filter by lessee name
    disabled: true
  - key: address
    value: ''
    description: Filter by address
    disabled: true
  - key: zipcode
    value: ''
    description: Filter by zipcode
    disabled: true
  - key: city
    value: ''
    description: Filter by city
    disabled: true
