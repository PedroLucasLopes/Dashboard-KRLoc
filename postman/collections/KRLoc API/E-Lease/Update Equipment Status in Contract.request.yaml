$kind: http-request
name: Update Equipment Status in Contract
method: PUT
url: '{{base_url}}/elease/status/:id'
order: 9000
pathVariables:
  - key: id
    value: '{{elease_id}}'
    description: Contract UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "equipments": [
        {
          "id": "{{equipment_id}}",
          "status": "AVAILABLE"
        }
      ]
    }
