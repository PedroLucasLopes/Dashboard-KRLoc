$kind: http-request
name: Remove Equipments from Contract
method: PUT
url: '{{base_url}}/elease/remove/:id'
order: 8000
pathVariables:
  - key: id
    value: '{{elease_id}}'
    description: Contract UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "equipments": ["{{equipment_id}}"]
    }
