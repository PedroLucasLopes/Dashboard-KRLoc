$kind: http-request
name: Replace Equipment in Contract
method: PUT
url: '{{base_url}}/elease/replace/:id'
order: 10000
pathVariables:
  - key: id
    value: '{{elease_id}}'
    description: Contract UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "replacements": [
        {
          "oldEquipmentId": "{{equipment_id}}",
          "newEquipmentId": "{{new_equipment_id}}"
        }
      ]
    }
