$kind: http-request
name: Create Contract
method: POST
url: '{{base_url}}/elease'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "lesseeId": "{{lessee_id}}",
      "startDate": "2026-04-01",
      "endDate": "2026-04-30",
      "finishDate": "2026-04-30",
      "status": "PENDING",
      "equipments": ["{{equipment_id}}"]
    }
