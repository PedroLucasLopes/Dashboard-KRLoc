$kind: http-request
name: Get All Contracts
method: GET
url: '{{base_url}}/elease'
order: 1000
queryParams:
  - key: page
    value: '1'
    description: Page number
    disabled: true
  - key: limit
    value: '10'
    description: Items per page
    disabled: true
  - key: order
    value: asc
    description: Sort order (asc or desc)
    disabled: true
  - key: lesseeId
    value: ''
    description: Filter by lessee UUID
    disabled: true
  - key: startDate
    value: ''
    description: 'Filter by start date (YYYY-MM-DD)'
    disabled: true
  - key: endDate
    value: ''
    description: 'Filter by end date (YYYY-MM-DD)'
    disabled: true
  - key: status
    value: PENDING
    description: 'Filter by status (PENDING, ACTIVE, CLOSED, CANCELLED)'
    disabled: true
  - key: equipmentName
    value: ''
    description: Filter by equipment name
    disabled: true
