$kind: http-request
name: Update Client
method: PUT
url: '{{base_url}}/client/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{client_id}}'
    description: Client UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Empresa Atualizada LTDA",
      "email": "novo@empresa.com",
      "phone": "+5511888888888"
    }
